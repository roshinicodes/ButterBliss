<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body>

<h1>Your Cart</h1>

<div id="cart"></div>

<h2 id="total"></h2>

<script src="cart.js"></script>

</body>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f8f8f8;
    font-family:Arial, Helvetica, sans-serif;
}

h1{
    text-align:center;
    margin:30px 0;
    color:#5a3e2b;
}

#cart{
    width:80%;
    margin:auto;
}

#cart div{
    background:white;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

#cart h3{
    color:#4b2e2e;
    margin-bottom:10px;
}

#cart p{
    margin:8px 0;
    font-size:18px;
}

hr{
    margin-top:15px;
    border:none;
    border-top:1px solid #ddd;
}

#total{
    width:80%;
    margin:30px auto;
    text-align:right;
    font-size:28px;
    color:#d2691e;
}
</style>
</html>
